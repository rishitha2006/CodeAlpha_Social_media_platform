<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:system-ui;
        }
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef2f3;
            padding:20px;
        }
        .card{
            width:100%;
            max-width:420px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }
        .card h1{
            text-align:center;
            color:#4aa786;
            margin-bottom:25px;
        }
        .input-box{
            margin-bottom:18px;
        }
        .input-box label{
            display:block;
            margin-bottom:8px;
            color:#444;
            font-size:14px;
        }
        .input-box input{
            width:100%;
            padding:13px;
            border-radius:12px;
            border:1px solid #ccc;
            outline:none;
            font-size:15px;
        }
        .input-box input:focus{
            border-color:#4aa786;
            box-shadow:0 0 6px rgba(74,167,134,0.3);
        }
        button{
            width:100%;
            border:none;
            background:#4aa786;
            color:white;
            padding:14px;
            border-radius:12px;
            cursor:pointer;
            font-size:15px;
            font-weight:600;
        }
        button:hover{
            background:#3c8f73;
        }
        .message{
            margin-top:15px;
            text-align:center;
            font-size:14px;
        }
        .footer{
            margin-top:18px;
            text-align:center;
            font-size:14px;
        }
        .footer a{
            color:#4aa786;
            text-decoration:none;
            font-weight:600;
        }
        @media(max-width:500px){
            .card{
                padding:25px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Login</h1>

    <div class="input-box">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <!-- 💡 FIX 1: Matched onclick function name to 'loginUser()' -->
    <button onclick="loginUser()">
        Login
    </button>

    <div class="message" id="message"></div>

    <div class="footer">
        Don't have account?
        <a href="/signup">Sign Up</a>
    </div>
</div>

<script>
async function loginUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill in all fields.");
        return;
    }

    try {
        const response = await fetch("http://localhost:8080/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

       if (data.token) {

    localStorage.setItem(
        "token",
        data.token
    );

    localStorage.setItem(
        "user",
        JSON.stringify(data.user)
    );

    alert("Login Successful ✅");

    window.location.href = "/home";

} else {

    alert(data.error || "Login failed");
}
    } catch (err) {
        console.error(err);
        alert("Login failed. Check server status.");
    }
}
</script>

</body>
</html>
